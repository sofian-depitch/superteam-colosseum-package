<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f72b8a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow orb -->
  <ellipse cx="200" cy="150" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Top badge -->
  <rect x="60" y="60" width="300" height="36" rx="18" fill="none" stroke="#f72b8a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="210" y="83" font-family="Arial, sans-serif" font-size="13" fill="#f72b8a" text-anchor="middle" letter-spacing="2">SUPERTEAM × DEPITCH</text>

  <!-- Main title -->
  <text x="60" y="210" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white">Colosseum</text>
  <text x="60" y="295" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#f72b8a">Package.</text>

  <!-- Subtitle -->
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="26" fill="#9ca3af">The #1 pitch program on Solana</text>
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="26" fill="#9ca3af">now available for Superteam builders.</text>

  <!-- Stats row -->
  <rect x="60" y="460" width="180" height="80" rx="12" fill="#14141f" stroke="#2a2a42" stroke-width="1"/>
  <text x="150" y="500" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#f72b8a" text-anchor="middle">16×</text>
  <text x="150" y="522" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Colosseum Prizes</text>

  <rect x="260" y="460" width="180" height="80" rx="12" fill="#14141f" stroke="#2a2a42" stroke-width="1"/>
  <text x="350" y="500" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#a855f7" text-anchor="middle">$2.5M</text>
  <text x="350" y="522" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Raised After Coaching</text>

  <rect x="460" y="460" width="180" height="80" rx="12" fill="#14141f" stroke="#2a2a42" stroke-width="1"/>
  <text x="550" y="500" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#f72b8a" text-anchor="middle">200+</text>
  <text x="550" y="522" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Builders Coached</text>

  <!-- Price tag -->
  <rect x="900" y="440" width="240" height="100" rx="16" fill="#f72b8a"/>
  <text x="1020" y="488" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.8">USDC</text>
  <text x="1020" y="528" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">4,999</text>

  <!-- URL -->
  <text x="1140" y="60" font-family="Arial, sans-serif" font-size="18" fill="#6b7280" text-anchor="end">depitch.academy</text>
</svg>
